# Kula World (Europe) — SCES-01000
# Values read from the PS-X EXE header of SCES_010.00 (extracted from the
# disc root, LBA 24). Note: the header stores KUSEG addresses (0x00011000);
# the parser normalizes them to KSEG0.

[game]
id           = "SCES-01000"
exe          = "games/kula/SCES_010.00"
load_address = "0x80011000"
entry_pc     = "0x80069F60"
text_size    = "0x93000"
stack_base   = "0x801FFFF0"
disc         = "games/kula/Kula World (Europe).cue"

[recompiler]
out_dir = "games/kula/generated"
strict  = true

[runtime]
debug_port   = 4370
window_title = "Kula World (PSXRecomp)"
controller   = "digital"
memcard_dir  = "."
